name: WM 2026 Live-Prognose

# Laeuft taeglich um 06:00 UTC (= 08:00 Schweizer Sommerzeit), nachdem die
# Spiele des Vortags abgeschlossen sind. Zusaetzlich manuell ausloesbar.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  forecast:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # noetig, um output/ zurueck ins Repo zu committen
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      - name: Prognose berechnen
        env:
          SPORTSDB_KEY: ${{ secrets.SPORTSDB_KEY }}   # in Repo-Settings hinterlegen
        run: python src/live_forecast.py

      - name: Ergebnis committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git commit -m "Live-Prognose $(date -u +%Y-%m-%d)" || echo "Keine Aenderung"
          git push
